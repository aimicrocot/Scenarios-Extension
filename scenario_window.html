<div id="scenario-manager-window" class="scenario-popup">
    <h3 class="scenario-header">
        <i class="fa-solid fa-puzzle-piece"></i> 
        <span>Сценарии персонажа</span>
    </h3>
    
    <!-- Список существующих сценариев -->
    <div id="scenario-list" class="scenario-list-scroll">
        <!-- Сюда JS вставит сценарии -->
    </div>

    <div class="scenario-new-entry">
        <textarea 
            id="new_scenario_text" 
            placeholder="Введите новый сценарий..." 
            class="text_pole" 
            rows="3"></textarea>
        
        <div class="scenario-footer">
            <span class="token-count">Токенов: 0</span>
            <button id="add_scenario_btn" class="menu_button">
                <i class="fa-solid fa-plus"></i> Добавить
            </button>
        </div>
    </div>
</div>
